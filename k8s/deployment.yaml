apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-devops-app
  namespace: default
  labels:
    app: my-devops-app
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-devops-app
  template:
    metadata:
      labels:
        app: my-devops-app
    spec:
      containers:
      - name: app
        image: idriss98/my-devops-app:latest
        ports:
        - containerPort: 3000
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: my-devops-app-service
  namespace: default
spec:
  type: NodePort
  selector:
    app: my-devops-app
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30080
      name: http